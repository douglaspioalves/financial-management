# Servidor
server.port=8080

# Datasource — lê variáveis de ambiente (fallback para dev local)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gastos}
spring.datasource.username=${DB_USER:gastos}
spring.datasource.password=${DB_PASSWORD:gastos}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — apenas valida o schema (Flyway cuida do DDL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logs
logging.level.com.gastos=INFO
logging.level.org.flywaydb=INFO
