# H2 em memória — substitui PostgreSQL nos testes de integração
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate gerencia o schema via entidades JPA
# Flyway desabilitado: migrations usam sintaxe exclusiva do PostgreSQL (gen_random_uuid, índices parciais)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=false
