services:

  # ─── Banco de dados PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gastos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gastos
      POSTGRES_USER: ${DB_USER:-gastos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gastos_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gastos} -d gastos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend Spring Boot ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gastos-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/gastos}
      DB_USER: ${DB_USER:-gastos}
      DB_PASSWORD: ${DB_PASSWORD:-gastos_dev_password}
      JWT_SECRET: ${JWT_SECRET:-troque_este_segredo_em_producao_use_256bits}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend Angular (servido via nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gastos-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: gastos_postgres_data
